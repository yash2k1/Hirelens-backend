server:
  port: 8080

spring:
  application:
    name: hirelens

  datasource:
    url: jdbc:postgresql://localhost:5432/hirelens?sslmode=disable
    username: postgres
    password: 302519
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 5432

gemini:
  api:
    key: YOUR_GEMINI_API_KEY

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG