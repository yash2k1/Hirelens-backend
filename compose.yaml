version: '3.9'

services:

  postgres:
    image: postgres:latest
    container_name: hirelens-postgres

    environment:
      POSTGRES_DB: hirelens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 302519

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: hirelens-redis

    ports:
      - "5432:5432"

volumes:
  postgres_data: